name: MLOps CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  linting:
    name: Code Quality - Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black pylint
      
      - name: Run flake8
        run: |
          echo "Running flake8 linting..."
          python -m flake8 src/ tests/ scripts/ --count --statistics --show-source
        continue-on-error: false
      
      - name: Run black formatting check
        run: |
          echo "Checking code formatting with black..."
          python -m black --check --diff src/ tests/ scripts/
        continue-on-error: true
      
      - name: Run pylint
        run: |
          echo "Running pylint..."
          python -m pylint src/ --disable=C0111,R0913,R0914 || true
        continue-on-error: true

  dag-integrity-test:
    name: Airflow DAG Integrity Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install Airflow and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install apache-airflow==2.8.1
          pip install -r requirements.txt
      
      - name: Test DAG integrity
        run: |
          echo "Testing DAG file for syntax errors and import issues..."
          python -c "
import sys
import os
from airflow.models import DagBag

sys.path.insert(0, os.path.abspath('airflow/dags'))

dag_bag = DagBag(dag_folder='airflow/dags', include_examples=False)

if dag_bag.import_errors:
    print('DAG Import Errors:')
    for filename, error in dag_bag.import_errors.items():
        print(f'File: {filename}')
        print(f'Error: {error}')
    sys.exit(1)

print(f'Successfully loaded {len(dag_bag.dags)} DAG(s)')
for dag_id, dag in dag_bag.dags.items():
    print(f'  - {dag_id}: {len(dag.tasks)} tasks')
    
print('All DAGs passed integrity check!')
"
      
      - name: Validate DAG structure
        run: |
          echo "Validating DAG structure..."
          python -c "
import sys
import os
from airflow.models import DagBag

sys.path.insert(0, os.path.abspath('airflow/dags'))

dag_bag = DagBag(dag_folder='airflow/dags', include_examples=False)

for dag_id, dag in dag_bag.dags.items():
    print(f'Validating DAG: {dag_id}')
    
    if not dag.tasks:
        print(f'ERROR: DAG {dag_id} has no tasks!')
        sys.exit(1)
    
    for task in dag.tasks:
        if not task.task_id:
            print(f'ERROR: Task in DAG {dag_id} has no task_id!')
            sys.exit(1)
    
    print(f'  ✓ DAG {dag_id} structure is valid')

print('All DAGs have valid structure!')
"

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: |
          echo "Building Docker image..."
          docker build -t ml-training:test .
      
      - name: Verify Docker image
        run: |
          echo "Verifying Docker image..."
          docker images | grep ml-training
          docker run --rm ml-training:test python --version
          docker run --rm ml-training:test pip list | grep -E "mlflow|dvc|scikit-learn"
      
      - name: Test Docker image with sample command
        run: |
          echo "Testing Docker image with sample Python command..."
          docker run --rm ml-training:test python -c "import mlflow; import dvc.api; import sklearn; print('All imports successful!')"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [linting]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run smoke tests
        run: |
          echo "Running smoke tests..."
          python -m pytest tests/test_smoke.py -v --tb=short
      
      - name: Run data validation tests
        run: |
          echo "Running data validation tests..."
          python -m pytest tests/test_data_validation.py -v --tb=short || true

  integration-tests:
    name: Integration Tests - Full Pipeline
    runs-on: ubuntu-latest
    needs: [linting, dag-integrity-test, docker-build]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Setup DVC
        run: |
          dvc remote list || echo "No DVC remotes configured"
      
      - name: Run data preparation
        run: |
          if [ -f "data/raw/dataset.csv" ]; then
            echo "Running data preparation..."
            python src/prepare.py data/raw/dataset.csv data/prepared
          else
            echo "Raw data not found, skipping preparation"
          fi
      
      - name: Train model
        run: |
          if [ -d "data/prepared" ] && [ "$(ls -A data/prepared)" ]; then
            echo "Training model..."
            python src/train.py data/prepared data/models \
              --n-estimators 100 \
              --max-depth 10 \
              --min-samples-leaf 5 \
              --random-state 42
          else
            echo "Prepared data not found, skipping training"
          fi
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
      
      - name: Verify artifacts
        run: |
          echo "Verifying generated artifacts..."
          if [ -f "data/models/model.pkl" ]; then
            echo "✓ model.pkl found"
          else
            echo "✗ model.pkl not found"
          fi
          
          if [ -f "data/models/metrics.json" ]; then
            echo "✓ metrics.json found"
            cat data/models/metrics.json
          else
            echo "✗ metrics.json not found"
          fi
          
          if [ -f "data/models/confusion_matrix.png" ]; then
            echo "✓ confusion_matrix.png found"
          else
            echo "✗ confusion_matrix.png not found"
          fi
      
      - name: Run artifact validation tests
        run: |
          echo "Running artifact validation tests..."
          python -m pytest tests/test_artifacts.py -v --tb=short || true
      
      - name: Run quality gate tests
        run: |
          echo "Running quality gate tests..."
          if [ -f "data/models/metrics.json" ]; then
            cp data/models/metrics.json metrics.json
          fi
          python -m pytest tests/test_quality_gate.py -v --tb=short || true
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-artifacts
          path: |
            data/models/
            metrics.json
          retention-days: 7

  generate-report:
    name: Generate ML Report
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: pipeline-artifacts
          path: artifacts/
      
      - name: Generate CML report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install cml
          
          echo "# 🤖 MLOps Pipeline Report" > report.md
          echo "" >> report.md
          echo "**Commit:** \`${{ github.sha }}\`" >> report.md
          echo "**Branch:** \`${{ github.head_ref }}\`" >> report.md
          echo "" >> report.md
          
          echo "## 📊 Training Metrics" >> report.md
          if [ -f "artifacts/metrics.json" ]; then
            echo '```json' >> report.md
            cat artifacts/metrics.json >> report.md
            echo '```' >> report.md
          else
            echo "_Metrics file not found_" >> report.md
          fi
          echo "" >> report.md
          
          echo "## 📈 Visualizations" >> report.md
          if [ -f "artifacts/feature_importance.png" ]; then
            echo "### Feature Importance" >> report.md
            cml publish artifacts/feature_importance.png --md >> report.md
          fi
          
          echo "" >> report.md
          echo "## ✅ Pipeline Status" >> report.md
          echo "- Linting: Passed" >> report.md
          echo "- DAG Integrity: Passed" >> report.md
          echo "- Docker Build: Passed" >> report.md
          echo "- Integration Tests: Passed" >> report.md
          
          cml comment create report.md

  publish-artifacts:
    name: Publish Model Artifacts
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: pipeline-artifacts
          path: artifacts/
      
      - name: Publish artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-model
          path: artifacts/
          retention-days: 30
